<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geriatric Front Door Tool – QMH AED</title>

  <style>
    :root,[data-theme="light"]{
      --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);
      --text-sm:clamp(.875rem,.8rem + .35vw,1rem);
      --text-base:clamp(1rem,.95rem + .25vw,1.125rem);
      --text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
      --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
      --sp1:.25rem;--sp2:.5rem;--sp3:.75rem;--sp4:1rem;--sp5:1.25rem;--sp6:1.5rem;--sp8:2rem;--sp10:2.5rem;--sp12:3rem;--sp16:4rem;
      --bg:#f7f6f2;--surf:#fbfbf9;--surf2:#f1efea;--bdr:#d4d1ca;--div:#dcd9d5;
      --tx:#28251d;--txm:#68665f;--txf:#9d9a92;--txi:#f9f8f4;
      --pri:#01696f;--prih:#0c4e54;--prihl:#dbeceb;
      --warn:#964219;--warnhl:#f3e0d4;
      --suc:#437a22;--suchl:#deead6;
      --err:#a12c7b;--errhl:#f2dbe8;
      --blue:#006494;--bluehl:#cce0ed;
      --rad-sm:.375rem;--rad-md:.5rem;--rad-lg:.75rem;--rad-xl:1rem;--rad-f:9999px;
      --sh-sm:0 1px 2px rgba(40,37,29,.06);--sh-md:0 4px 12px rgba(40,37,29,.08);
      --font:'Satoshi','Inter',sans-serif;--trans:180ms cubic-bezier(.16,1,.3,1);
    }
    [data-theme="dark"]{
      --bg:#171614;--surf:#1c1b19;--surf2:#23211f;--bdr:#393836;--div:#2a2927;
      --tx:#e1dfda;--txm:#b0ada6;--txf:#7f7b74;--txi:#1a1917;
      --pri:#4f98a3;--prih:#67aeb8;--prihl:#233437;
      --warn:#d28c62;--warnhl:#49362b;--suc:#79b456;--suchl:#2d3f26;--err:#d163a7;--errhl:#442738;--blue:#5591c7;--bluehl:#2a3e52;
      --sh-sm:0 1px 2px rgba(0,0,0,.25);--sh-md:0 4px 16px rgba(0,0,0,.32);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
    body{min-height:100dvh;font-family:var(--font);font-size:var(--text-sm);line-height:1.6;background:var(--bg);color:var(--tx)}
    img,svg{display:block;max-width:100%}
    button,input,textarea,select{font:inherit;color:inherit}
    button{cursor:pointer;border:none;background:none}
    table{width:100%;border-collapse:collapse}
    :focus-visible{outline:2px solid var(--pri);outline-offset:3px;border-radius:var(--rad-sm)}
    .app{display:grid;grid-template-columns:260px 1fr;min-height:100dvh}
    .sidebar{background:var(--surf);border-right:1px solid var(--bdr);padding:var(--sp5);position:sticky;top:0;height:100dvh;overflow-y:auto;display:flex;flex-direction:column;gap:var(--sp4)}
    .brand{display:flex;align-items:center;gap:var(--sp3)}
    .logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--pri),color-mix(in srgb,var(--pri) 55%,white));display:grid;place-items:center;color:#fff;flex-shrink:0;box-shadow:var(--sh-md)}
    .brand-text h1{font-size:var(--text-base);font-weight:900;line-height:1.15}
    .brand-text p{font-size:var(--text-xs);color:var(--txf)}
    .nav-label{font-size:var(--text-xs);text-transform:uppercase;letter-spacing:.08em;color:var(--txf);margin-bottom:var(--sp2);padding-left:var(--sp2)}
    .nav-btn{width:100%;display:flex;align-items:center;gap:var(--sp3);padding:var(--sp2) var(--sp3);border-radius:var(--rad-lg);font-size:var(--text-sm);text-align:left;transition:all var(--trans);margin-bottom:2px}
    .nav-btn svg{flex-shrink:0;opacity:.6}
    .nav-btn:hover,.nav-btn.active{background:var(--prihl);color:var(--pri)}
    .nav-btn.active svg{opacity:1}
    .nav-reminders{font-size:var(--text-xs);color:var(--txm);background:var(--surf2);border-radius:var(--rad-lg);padding:var(--sp3);display:grid;gap:var(--sp2);margin-top:auto}
    .nav-reminders strong{color:var(--tx)}
    .main{display:flex;flex-direction:column;min-width:0}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:var(--sp4);padding:var(--sp3) var(--sp6);border-bottom:1px solid var(--bdr);background:color-mix(in srgb,var(--surf) 90%,transparent);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10;flex-wrap:wrap}
    .page-title h2{font-size:var(--text-xl);font-weight:900;line-height:1}
    .page-title .sub{font-size:var(--text-xs);color:var(--txm);margin-top:2px}
    .toolbar{display:flex;gap:var(--sp2);align-items:center;flex-wrap:wrap}
    .btn{display:inline-flex;align-items:center;gap:var(--sp2);padding:.6rem 1rem;border-radius:var(--rad-f);font-size:var(--text-xs);font-weight:700;transition:all var(--trans);white-space:nowrap}
    .btn-pri{background:var(--pri);color:var(--txi)} .btn-pri:hover{background:var(--prih)}
    .btn-sec{background:var(--surf2);border:1px solid var(--bdr)} .btn-sec:hover{background:var(--div)}
    .content{padding:var(--sp5) var(--sp6);display:grid;gap:var(--sp5);max-width:1600px;width:100%;margin:0 auto}
    .page{display:none;gap:var(--sp5)} .page.active{display:grid}
    .card{background:var(--surf);border:1px solid color-mix(in srgb,var(--tx) 9%,transparent);border-radius:var(--rad-xl);padding:var(--sp5);box-shadow:var(--sh-sm)}
    .card-title{font-size:var(--text-base);font-weight:800;margin-bottom:var(--sp3)}
    .muted{color:var(--txm)} .tiny{font-size:var(--text-xs);color:var(--txm)}
    .g2{display:grid;grid-template-columns:repeat(2,1fr);gap:var(--sp4)}
    .g3{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--sp4)}
    .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--sp4)}
    .kpi{background:var(--surf2);border:1px solid var(--div);border-radius:var(--rad-lg);padding:var(--sp4)}
    .kpi .k-label{font-size:var(--text-xs);text-transform:uppercase;letter-spacing:.05em;color:var(--txf)}
